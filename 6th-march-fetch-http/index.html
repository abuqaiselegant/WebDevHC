<html>
    <head>
        <script>
            
            async function add() {
                const a = document.getElementById("first").value;
                const b = document.getElementById("second").value;

                // document.getElementById("response").innerHTML = parseInt(a) + parseInt(b);
                // axios
                const res = await fetch("http://localhost:3002/sum/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        a: a,
                        b: b
                    })
                });
                const json = await res.json()
                document.getElementById("response").innerHTML = json.ans;
            }

            async function sub() {
                const a = document.getElementById("first").value;
                const b = document.getElementById("second").value;

                const res = await fetch("http://localhost:3002/sub/",{
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        a: a,
                        b: b
                    })
                })
                const json = await res.json()
                document.getElementById("response").innerHTML = json.ans;
            }

            async function mul() {
                const a = document.getElementById("first").value;
                const b = document.getElementById("second").value;
                
                const res = await fetch("http://localhost:3002/mul/",{
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        a: a,
                        b: b
                    })
                })
                const json = await res.json()
                document.getElementById("response").innerHTML = json.ans;
            }

            async function div() {
                const a = document.getElementById("first").value;
                const b = document.getElementById("second").value;
                
                const res = await fetch("http://localhost:3002/div/",{
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        a: a,
                        b: b
                    })
                })
                const json = await res.json()
                document.getElementById("response").innerHTML = json.ans;
            }

        </script>
    </head>
    <body>
        <input id="first" type="text" placeholder="first number" />
        <input id="second" type="text" placeholder="second number" />

        <button onclick="add()">Add</button>
        <button onclick="sub()">Sub</button>
        <button onclick="div()">Div</button>
        <button onclick="mul()">Mul</button>

        <div id="response"></div>
    </body>
</html>
